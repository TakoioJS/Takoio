[build]
  command = "npm install -g pnpm@9 && pnpm install && cd src/admin && pnpm install && npx vite build && cd ../server && pnpm install && NITRO_PRESET=netlify npx nitro build"
  publish = ".output/public"

[functions]
  directory = ".output/server"
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server/:splat"
  status = 200
