[build]
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter takoio-admin build && pnpm --filter takoio-server build:netlify"
  publish = ".output/public"

[functions]
  directory = ".output/server"
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server/:splat"
  status = 200
