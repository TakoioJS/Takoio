<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takoio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #64748b;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .article {
      background: #fff;
      border-radius: 4px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid #e2e8f0;
    }

    .article h2 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .article p {
      margin-bottom: 12px;
      color: #475569;
    }

    .article code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin: 32px 0 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e2e8f0;
    }

    #takoio {
      margin-top: 8px;
    }

    /* 日夜切换及暗黑模式样式 */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .theme-toggle-btn {
      background: none;
      border: 1px solid #e2e8f0;
      padding: 8px;
      border-radius: 50%;
      cursor: pointer;
      color: #64748b;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      outline: none;
    }

    .theme-toggle-btn:hover {
      background: #f1f5f9;
      color: #1e293b;
    }

    .sun-icon {
      display: none;
    }

    .moon-icon {
      display: block;
    }

    /* 宿主页面暗黑模式 */
    body.dark {
      background: #0f172a;
      color: #f1f5f9;
    }

    body.dark .article {
      background: #1e293b;
      border-color: #334155;
      color: #e2e8f0;
    }

    body.dark .article p {
      color: #94a3b8;
    }

    body.dark .article code {
      background: #334155;
      color: #f1f5f9;
    }

    body.dark .subtitle {
      color: #94a3b8;
    }

    body.dark .section-title {
      border-bottom-color: #334155;
    }

    body.dark .theme-toggle-btn {
      border-color: #334155;
      color: #94a3b8;
    }

    body.dark .theme-toggle-btn:hover {
      background: #1e293b;
      color: #f1f5f9;
    }

    body.dark .sun-icon {
      display: block;
    }

    body.dark .moon-icon {
      display: none;
    }
  </style>
</head>

<body>
  <script>
    // 立即执行脚本以防止页面闪烁
    const currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
    if (currentTheme === 'dark') {
      document.body.classList.add('dark')
    }
  </script>

  <div class="container">
    <div class="header-row">
      <div>
        <h1>Takoio</h1>
        <p class="subtitle" style="margin-bottom: 0;">Vue 3 + Vite 8 + TypeScript</p>
      </div>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="切换主题">
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
    <h3 class="section-title">💬 评论</h3>
    <div id="takoio"></div>
  </div>

  <script>
    // 注册切换事件
    document.getElementById('theme-toggle').addEventListener('click', () => {
      document.body.classList.toggle('dark')
      const theme = document.body.classList.contains('dark') ? 'dark' : 'light'
      localStorage.setItem('theme', theme)
    })
  </script>

  <script type="module">
    import { createApp } from 'vue'
    import App from './src/client/view/App.vue'

    console.log('🚀 Takoio v1.0.0 Dev Server Starting...')

    const app = createApp(App, {
      tcb: null,
      options: {
        envId: 'http://localhost:8080',
        lang: 'zh-CN',
        path: '/test-article',
        title: '测试文章',
        pageSize: 10,
        sort: 'newest',
        enableSummary: true,
        enableCommentReaction: true,
        enableArticleReaction: true,
        articleContent: '这是一篇测试文章的内容。Takoio 是一个嵌入式评论系统，支持 Vue 3 + Vite 构建，提供评论、点赞、表情、代码高亮等功能。本文介绍了如何集成 AI 摘要功能。通过传入文章内容，系统会自动调用 AI 生成摘要并展示在评论上方。',
        onCommentPosted: (comment) => {
          console.log('📝 新评论（本地）:', comment)
        },
        onError: (err) => {
          console.warn('⚠️ 后端不可用（开发模式正常）:', err.message)
        }
      }
    })

    app.mount('#takoio')

    console.log('✅ Takoio v1.0.0 mounted!')
    console.log('💡 开发模式：后端不可用，评论区 UI 正常预览')
    console.log('💡 管理面板：访问 /admin 进入独立管理后台')
  </script>
</body>

</html>
